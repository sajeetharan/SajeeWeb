    <path d="M85 120 C82 130 82 140 88 152 C95 162 108 168 120 168 C132 168 145 162 152 152 C158 140 158 130 155 120" stroke-width="1.5" opacity="0.4" stroke-dasharray="2 3"/>
    <path d="M90 135 C92 145 100 155 110 160" stroke-width="1" opacity="0.3" stroke-dasharray="1 4"/>
    <path d="M150 135 C148 145 140 155 130 160" stroke-width="1" opacity="0.3" stroke-dasharray="1 4"/>
    <path d="M100 140 C105 150 112 157 120 160 C128 157 135 150 140 140" stroke-width="1" opacity="0.3" stroke-dasharray="1.5 3"/>
